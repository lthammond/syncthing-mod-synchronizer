name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compile ps1 to exe
        shell: pwsh
        run: |
          Install-Module ps2exe -Force -Scope CurrentUser
          Invoke-ps2exe .\SyncthingModSynchronizer.ps1 .\SyncthingModSynchronizer.exe -noConsole -STA -title "Syncthing Mod Synchronizer"

      - name: Create release and upload exe
        uses: softprops/action-gh-release@v2
        with:
          files: SyncthingModSynchronizer.exe
